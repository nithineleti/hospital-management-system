<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Hospital Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00d4ff;
            --primary-dark: #0099cc;
            --success: #00f5a0;
            --danger: #ff006e;
            --dark: #0f1419;
            --light: #f8f9fa;
            --gradient-blue: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            --gradient-green: linear-gradient(135deg, #00f5a0 0%, #00d084 100%);
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 50%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
            position: relative;
            padding: 2rem 0;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(0, 212, 255, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255, 0, 110, 0.15) 0%, transparent 50%);
            animation: moveBackground 15s ease infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes moveBackground {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(50px, 50px); }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            padding: 2rem;
        }

        .register-card {
            background: linear-gradient(135deg, rgba(15, 20, 25, 0.8) 0%, rgba(26, 31, 46, 0.8) 100%);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(0, 212, 255, 0.2);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3),
                        inset 0 1px 1px rgba(255, 255, 255, 0.1);
            animation: slideInUp 0.6s ease-out;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .register-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .register-header h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            background: var(--gradient-blue);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }

        .register-header p {
            color: #888;
            font-size: 0.9rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.7rem;
            color: #b0b0b0;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="tel"],
        input[type="date"],
        select {
            width: 100%;
            padding: 0.9rem 1rem;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.3) 0%, rgba(0, 212, 255, 0.05) 100%);
            border: 2px solid rgba(0, 212, 255, 0.2);
            border-radius: 10px;
            color: #00f5a0;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        input::placeholder {
            color: #555;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: rgba(0, 212, 255, 0.8);
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.5) 0%, rgba(0, 212, 255, 0.1) 100%);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2),
                        inset 0 0 10px rgba(0, 212, 255, 0.05);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .checkbox-group label {
            margin: 0;
            text-transform: none;
            letter-spacing: normal;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .register-btn {
            width: 100%;
            padding: 1rem;
            border: 2px solid var(--primary);
            background: transparent;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .register-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--gradient-blue);
            transition: left 0.3s ease;
            z-index: -1;
        }

        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }

        .register-btn:hover::before {
            left: 0;
        }

        .message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            display: none;
            animation: slideInDown 0.3s ease-out;
        }

        .message.active {
            display: block;
        }

        .message.error {
            background: rgba(255, 0, 110, 0.1);
            border-left: 3px solid var(--danger);
            color: var(--danger);
        }

        .message.success {
            background: rgba(0, 245, 160, 0.1);
            border-left: 3px solid var(--success);
            color: var(--success);
        }

        .link-section {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #888;
        }

        .link-section a {
            color: var(--primary);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .link-section a:hover {
            color: var(--success);
        }

        .back-link {
            display: inline-block;
            margin-bottom: 2rem;
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            color: var(--success);
            transform: translateX(-5px);
        }

        @media (max-width: 480px) {
            .container {
                padding: 1rem;
            }

            .register-card {
                padding: 1.5rem 1rem;
            }

            .register-header h1 {
                font-size: 1.5rem;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/hospital/" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>

        <div class="register-card">
            <div class="register-header">
                <h1><i class="fas fa-user-plus"></i> Register</h1>
                <p>Create a new account</p>
            </div>

            <!-- Error Message -->
            <div th:if="${error}" class="message error active">
                <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
            </div>

            <!-- Success Message -->
            <div th:if="${success}" class="message success active">
                <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
            </div>

            <!-- Register Form -->
            <form method="post" action="/hospital/auth/register">
                <!-- CSRF Token -->
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">
                            <i class="fas fa-user"></i> First Name
                        </label>
                        <input type="text" 
                               id="firstName" 
                               name="firstName" 
                               placeholder="First name" 
                               required>
                    </div>

                    <div class="form-group">
                        <label for="lastName">
                            Last Name
                        </label>
                        <input type="text" 
                               id="lastName" 
                               name="lastName" 
                               placeholder="Last name" 
                               required>
                    </div>
                </div>

                <div class="form-group form-row full">
                    <label for="email">
                        <i class="fas fa-envelope"></i> Email
                    </label>
                    <input type="email" 
                           id="email" 
                           name="email" 
                           placeholder="Enter your email" 
                           required>
                </div>

                <div class="form-group form-row full">
                    <label for="phone">
                        <i class="fas fa-phone"></i> Phone Number
                    </label>
                    <input type="tel" 
                           id="phone" 
                           name="phoneNumber" 
                           placeholder="Enter your phone number">
                </div>

                <div class="form-group form-row full">
                    <label for="username">
                        <i class="fas fa-user-circle"></i> Username
                    </label>
                    <input type="text" 
                           id="username" 
                           name="username" 
                           placeholder="Choose a username" 
                           required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock"></i> Password
                        </label>
                        <input type="password" 
                               id="password" 
                               name="password" 
                               placeholder="Enter password" 
                               required>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">
                            Confirm Password
                        </label>
                        <input type="password" 
                               id="confirmPassword" 
                               name="confirmPassword" 
                               placeholder="Confirm password" 
                               required>
                    </div>
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="agree" name="agree" required>
                    <label for="agree">I agree to the terms and conditions</label>
                </div>

                <button type="submit" class="register-btn">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <div class="link-section">
                <p>Already have an account? <a href="/hospital/auth/login">Login here</a></p>
            </div>
        </div>
    </div>
</body>
</html>
