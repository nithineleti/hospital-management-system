<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Hospital System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #00d4ff;
            --success: #00f5a0;
            --danger: #ff006e;
            --dark: #0f1419;
            --gradient-blue: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 50%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            width: 100%;
            max-width: 500px;
        }
        .form-card {
            background: linear-gradient(135deg, rgba(15, 20, 25, 0.9) 0%, rgba(26, 31, 46, 0.9) 100%);
            border: 2px solid rgba(0, 212, 255, 0.2);
            border-radius: 15px;
            padding: 2rem;
        }
        .form-card h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            background: var(--gradient-blue);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .form-card .subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--primary);
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid rgba(0, 212, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0, 212, 255, 0.05);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
        }
        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }
        button {
            flex: 1;
            padding: 0.8rem 1.5rem;
            border: 2px solid var(--primary);
            background: var(--gradient-blue);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
        }
        .btn-link {
            background: transparent;
            color: var(--primary);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border: 2px solid var(--primary);
        }
        .btn-link:hover {
            background: rgba(0, 212, 255, 0.1);
        }
        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }
        .alert.success {
            background: rgba(0, 245, 160, 0.1);
            border: 1px solid rgba(0, 245, 160, 0.3);
            color: var(--success);
        }
        .alert.error {
            background: rgba(255, 0, 110, 0.1);
            border: 1px solid rgba(255, 0, 110, 0.3);
            color: var(--danger);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-card">
            <h1><i class="fas fa-lock"></i> Forgot Password</h1>
            <p class="subtitle">Enter your email address to reset your password</p>

            <div class="alert success" th:if="${param.success}">
                <i class="fas fa-check-circle"></i> Check your email for password reset instructions
            </div>

            <div class="alert error" th:if="${param.error}">
                <i class="fas fa-exclamation-circle"></i> Email not found. Please try again.
            </div>
            
            <form action="/hospital/auth/forgot-password" method="POST">
                <input type="hidden" name="_csrf" th:value="${_csrf?.token}">
                
                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" name="email" required placeholder="your@hospital.com">
                </div>

                <div class="btn-group">
                    <button type="submit"><i class="fas fa-paper-plane"></i> Send Reset Link</button>
                </div>

                <div style="text-align: center; margin-top: 1.5rem;">
                    <p style="color: #888; margin-bottom: 1rem;">Remember your password?</p>
                    <a href="/hospital/auth/login" class="btn-link" style="justify-content: center; width: 100%;">
                        <i class="fas fa-sign-in-alt"></i> Back to Login
                    </a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
