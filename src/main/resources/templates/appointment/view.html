<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment Details - Hospital System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #00d4ff;
            --primary-dark: #0099cc;
            --success: #00f5a0;
            --danger: #ff006e;
            --dark: #0f1419;
            --gradient-blue: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 50%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.7rem 1.5rem;
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            margin-bottom: 2rem;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: var(--gradient-blue);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
        }
        .details-card {
            background: linear-gradient(135deg, rgba(15, 20, 25, 0.9) 0%, rgba(26, 31, 46, 0.9) 100%);
            border: 2px solid rgba(0, 212, 255, 0.2);
            border-radius: 15px;
            padding: 2rem;
        }
        .details-card h1 {
            font-size: 1.8rem;
            margin-bottom: 2rem;
            background: var(--gradient-blue);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .detail-row {
            display: grid;
            grid-template-columns: 150px 1fr;
            gap: 2rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
        }
        .detail-row:last-child {
            border-bottom: none;
        }
        .detail-label {
            color: var(--primary);
            font-weight: 600;
        }
        .detail-value {
            color: #ccc;
        }
        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.7rem 1.5rem;
            border: 2px solid var(--primary);
            background: transparent;
            color: var(--primary);
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background: var(--gradient-blue);
            color: white;
            transform: translateY(-2px);
        }
        .btn.danger {
            border-color: var(--danger);
            color: var(--danger);
        }
        .btn.danger:hover {
            background: var(--danger);
        }
        .status-badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .status-scheduled {
            background: rgba(0, 245, 160, 0.2);
            color: var(--success);
        }
        .status-completed {
            background: rgba(0, 212, 255, 0.2);
            color: var(--primary);
        }
        .status-cancelled {
            background: rgba(255, 0, 110, 0.2);
            color: var(--danger);
        }
    </style>
</head>
<body>
    <div class="container">
        <a th:href="@{/appointment/list}" class="back-btn">
            <i class="fas fa-arrow-left"></i> Back to List
        </a>

        <div class="details-card" th:if="${appointment}">
            <h1><i class="fas fa-calendar-check"></i> Appointment Details</h1>

            <div class="detail-row">
                <div class="detail-label">Appointment ID:</div>
                <div class="detail-value" th:text="${appointment.appointmentId}"></div>
            </div>

            <div class="detail-row">
                <div class="detail-label">Patient:</div>
                <div class="detail-value" th:text="${appointment.patient?.firstName + ' ' + appointment.patient?.lastName}"></div>
            </div>

            <div class="detail-row">
                <div class="detail-label">Doctor:</div>
                <div class="detail-value" th:text="${appointment.doctor?.firstName + ' ' + appointment.doctor?.lastName}"></div>
            </div>

            <div class="detail-row">
                <div class="detail-label">Date & Time:</div>
                <div class="detail-value" th:text="${#temporals.format(appointment.appointmentDateTime, 'yyyy-MM-dd HH:mm')}"></div>
            </div>

            <div class="detail-row">
                <div class="detail-label">Reason:</div>
                <div class="detail-value" th:text="${appointment.reason}"></div>
            </div>

            <div class="detail-row">
                <div class="detail-label">Notes:</div>
                <div class="detail-value" th:text="${appointment.notes}"></div>
            </div>

            <div class="detail-row">
                <div class="detail-label">Priority:</div>
                <div class="detail-value" th:text="${appointment.priority}"></div>
            </div>

            <div class="detail-row">
                <div class="detail-label">Status:</div>
                <div class="detail-value">
                    <span class="status-badge" th:classappend="${appointment.status == 'Completed' ? 'status-completed' : appointment.status == 'Cancelled' ? 'status-cancelled' : 'status-scheduled'}" th:text="${appointment.status}"></span>
                </div>
            </div>

            <div class="detail-row">
                <div class="detail-label">Consultation Expiry:</div>
                <div class="detail-value" th:text="${#temporals.format(appointment.consultationExpiryDate, 'yyyy-MM-dd HH:mm')}"></div>
            </div>

            <div class="detail-row" th:if="${appointment.followUpDate != null}">
                <div class="detail-label">Follow-up Date:</div>
                <div class="detail-value" th:text="${#temporals.format(appointment.followUpDate, 'yyyy-MM-dd HH:mm')}"></div>
            </div>

            <div class="btn-group">
                <a th:href="@{/hospital/appointment/edit/{id}(id=${appointment.appointmentId})}" class="btn">
                    <i class="fas fa-edit"></i> Edit
                </a>
                <a th:href="@{/hospital/appointment/delete/{id}(id=${appointment.appointmentId})}" class="btn danger" onclick="return confirm('Are you sure?')">
                    <i class="fas fa-trash"></i> Delete
                </a>
            </div>
        </div>

        <div class="details-card" th:unless="${appointment}">
            <p>Appointment not found.</p>
        </div>
    </div>
</body>
</html>
