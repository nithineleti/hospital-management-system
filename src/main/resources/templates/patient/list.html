<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Management - Hospital System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #00d4ff;
            --primary-dark: #0099cc;
            --success: #00f5a0;
            --danger: #ff006e;
            --warning: #ffd60a;
            --dark: #0f1419;
            --gradient-blue: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 50%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background orbs */
        body::before {
            content: '';
            position: fixed;
            top: 10%;
            left: 5%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            animation: float-orb 8s ease-in-out infinite;
            pointer-events: none;
            z-index: 1;
            filter: blur(40px);
        }

        body::after {
            content: '';
            position: fixed;
            bottom: 10%;
            right: 5%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 0, 110, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            animation: float-orb-reverse 10s ease-in-out infinite;
            pointer-events: none;
            z-index: 1;
            filter: blur(40px);
        }

        @keyframes float-orb {
            0%, 100% { transform: translateY(0) translateX(0); }
            25% { transform: translateY(-40px) translateX(20px); }
            50% { transform: translateY(0) translateX(40px); }
            75% { transform: translateY(40px) translateX(20px); }
        }

        @keyframes float-orb-reverse {
            0%, 100% { transform: translateY(0) translateX(0); }
            25% { transform: translateY(40px) translateX(-20px); }
            50% { transform: translateY(0) translateX(-40px); }
            75% { transform: translateY(-40px) translateX(-20px); }
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .header h1 {
            font-size: 2rem;
            background: var(--gradient-blue);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.7rem 1.2rem;
            border: 2px solid var(--primary);
            background: transparent;
            color: var(--primary);
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background: var(--gradient-blue);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
        }
        .btn.success { border-color: var(--success); color: var(--success); }
        .btn.success:hover { background: var(--success); color: #000; }
        .btn.danger { border-color: var(--danger); color: var(--danger); }
        .btn.danger:hover { background: var(--danger); color: white; }
        .btn.small { padding: 0.4rem 0.8rem; font-size: 0.8rem; }

        .search-box {
            display: flex;
            gap: 0.5rem;
            background: rgba(0, 0, 0, 0.3);
            padding: 0.5rem;
            border-radius: 10px;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }
        .search-box input {
            padding: 0.6rem 1rem;
            border: none;
            background: transparent;
            color: #fff;
            font-size: 0.9rem;
            width: 250px;
            outline: none;
        }
        .search-box input::placeholder { color: #888; }
        .search-box select {
            padding: 0.6rem;
            border: none;
            background: rgba(0, 212, 255, 0.1);
            color: #fff;
            border-radius: 5px;
            cursor: pointer;
        }
        .search-box select option { background: #1a1f2e; }

        .alert {
            padding: 1rem 1.5rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            animation: slideIn 0.3s ease;
        }
        .alert.success {
            background: rgba(0, 245, 160, 0.1);
            border: 1px solid rgba(0, 245, 160, 0.3);
            color: var(--success);
        }
        .alert.error {
            background: rgba(255, 0, 110, 0.1);
            border: 1px solid rgba(255, 0, 110, 0.3);
            color: var(--danger);
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 15px;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.2);
        }
        .stat-card i {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }
        .stat-card h3 { font-size: 2rem; color: #fff; margin-bottom: 0.3rem; }
        .stat-card p { color: #888; font-size: 0.9rem; }

        .table-container {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 15px;
            overflow: hidden;
        }
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            background: rgba(0, 212, 255, 0.05);
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
        }
        .table-header h3 { color: var(--primary); }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        thead { background: rgba(0, 212, 255, 0.1); }
        th {
            padding: 1rem;
            text-align: left;
            color: var(--primary);
            font-weight: 600;
            border-bottom: 2px solid rgba(0, 212, 255, 0.3);
        }
        td {
            padding: 1rem;
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
            color: #ccc;
        }
        tr:hover { background: rgba(0, 212, 255, 0.05); }
        .status {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .status.active, .status.Active, .status.ACTIVE {
            background: rgba(0, 245, 160, 0.2);
            color: var(--success);
        }
        .status.inactive, .status.Inactive, .status.INACTIVE {
            background: rgba(255, 0, 110, 0.2);
            color: var(--danger);
        }
        .actions {
            display: flex;
            gap: 0.5rem;
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #888;
        }
        .empty-state i {
            font-size: 4rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 20px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            animation: modalIn 0.3s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .modal-header h2 {
            background: var(--gradient-blue);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .close-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .close-btn:hover { color: var(--danger); }

        @media (max-width: 768px) {
            .header { flex-direction: column; }
            .header-actions { width: 100%; flex-wrap: wrap; }
            .search-box { width: 100%; }
            .search-box input { width: 100%; }
            table { font-size: 0.85rem; }
            th, td { padding: 0.6rem; }
            .actions { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-users"></i> Patient Management</h1>
            <div class="header-actions">
                <form th:action="@{/patient/search}" method="post" class="search-box">
                    <select name="searchType">
                        <option value="firstName">First Name</option>
                        <option value="lastName">Last Name</option>
                        <option value="email">Email</option>
                        <option value="phone">Phone</option>
                    </select>
                    <input type="text" name="searchValue" placeholder="Search patients..." required>
                    <button type="submit" class="btn small"><i class="fas fa-search"></i></button>
                </form>
                <a th:href="@{/patient/add}" class="btn success">
                    <i class="fas fa-plus"></i> Add New Patient
                </a>
                <a th:href="@{/}" class="btn">
                    <i class="fas fa-arrow-left"></i> Dashboard
                </a>
            </div>
        </div>

        <!-- Flash Messages -->
        <div th:if="${success}" class="alert success">
            <i class="fas fa-check-circle"></i>
            <span th:text="${success}"></span>
        </div>
        <div th:if="${error}" class="alert error">
            <i class="fas fa-exclamation-circle"></i>
            <span th:text="${error}"></span>
        </div>

        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <i class="fas fa-users"></i>
                <h3 th:text="${patients != null ? patients.size() : 0}">0</h3>
                <p>Total Patients</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-user-check"></i>
                <h3 th:text="${#lists.size(patients?.![status == 'ACTIVE' or status == 'Active']) ?: 0}">0</h3>
                <p>Active Patients</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-calendar-check"></i>
                <h3>Today</h3>
                <p th:text="${#temporals.format(#temporals.createNow(), 'MMM dd, yyyy')}">Date</p>
            </div>
        </div>

        <!-- Patients Table -->
        <div class="table-container">
            <div class="table-header">
                <h3><i class="fas fa-table"></i> All Patients</h3>
                <span th:text="'Showing ' + (${patients != null ? patients.size() : 0}) + ' patients'"></span>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Blood Group</th>
                        <th>Gender</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="patient : ${patients}">
                        <td th:text="'#P' + ${patient.patientId}"></td>
                        <td th:text="${patient.firstName + ' ' + patient.lastName}"></td>
                        <td th:text="${patient.email}"></td>
                        <td th:text="${patient.phoneNumber}"></td>
                        <td th:text="${patient.bloodGroup ?: 'N/A'}"></td>
                        <td th:text="${patient.gender ?: 'N/A'}"></td>
                        <td>
                            <span class="status" th:classappend="${patient.status}" th:text="${patient.status}">Active</span>
                        </td>
                        <td class="actions">
                            <a th:href="@{/patient/view/{id}(id=${patient.patientId})}" class="btn small">
                                <i class="fas fa-eye"></i>
                            </a>
                            <a th:href="@{/patient/edit/{id}(id=${patient.patientId})}" class="btn small">
                                <i class="fas fa-edit"></i>
                            </a>
                            <a th:href="@{/patient/schedule/{id}(id=${patient.patientId})}" class="btn small success">
                                <i class="fas fa-calendar-plus"></i>
                            </a>
                            <form th:action="@{/patient/delete/{id}(id=${patient.patientId})}" method="get" style="display:inline;" 
                                  onsubmit="return confirm('Are you sure you want to delete this patient?');">
                                <button type="submit" class="btn small danger">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${patients == null or patients.isEmpty()}">
                        <td colspan="8" class="empty-state">
                            <i class="fas fa-user-slash"></i>
                            <p>No patients found</p>
                            <a th:href="@{/patient/add}" class="btn success" style="margin-top: 1rem;">
                                <i class="fas fa-plus"></i> Add First Patient
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
