<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Appointment</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #00d4ff;
            --success: #00f5a0;
            --danger: #ff006e;
            --warning: #ffd60a;
            --gradient-blue: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 50%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 2rem;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .header h1 {
            font-size: 2rem;
            background: var(--gradient-blue);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.7rem 1.2rem;
            border: 2px solid var(--primary);
            background: transparent;
            color: var(--primary);
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background: var(--gradient-blue);
            color: white;
            transform: translateY(-2px);
        }
        .btn.success { border-color: var(--success); color: var(--success); }
        .btn.success:hover { background: var(--success); color: #000; }

        .patient-info {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        .patient-avatar {
            width: 60px;
            height: 60px;
            background: var(--gradient-blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
        }
        .patient-details h3 { color: #fff; margin-bottom: 0.3rem; }
        .patient-details p { color: #888; font-size: 0.9rem; }

        .form-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 20px;
            padding: 2rem;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .form-group.full-width { grid-column: span 2; }
        .form-group label {
            color: var(--primary);
            font-weight: 500;
            font-size: 0.9rem;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 0.8rem 1rem;
            border: 2px solid rgba(0, 212, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }
        .form-group select option { background: #1a1f2e; }
        .form-group textarea { resize: vertical; min-height: 100px; }
        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(0, 212, 255, 0.2);
        }
        .section-title {
            grid-column: span 2;
            color: var(--primary);
            font-size: 1.1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
        }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .form-group.full-width, .section-title { grid-column: span 1; }
            .patient-info { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-calendar-plus"></i> Schedule Appointment</h1>
            <a th:href="@{/patient/list}" class="btn">
                <i class="fas fa-arrow-left"></i> Back to List
            </a>
        </div>

        <div class="patient-info">
            <div class="patient-avatar">
                <i class="fas fa-user"></i>
            </div>
            <div class="patient-details">
                <h3 th:text="${patient.firstName + ' ' + patient.lastName}">Patient Name</h3>
                <p th:text="'Patient ID: #P' + ${patient.patientId} + ' | ' + ${patient.email}">Details</p>
            </div>
        </div>

        <div class="form-card">
            <form th:action="@{/patient/schedule/{id}(id=${patient.patientId})}" method="post">
                <div class="form-grid">
                    <h3 class="section-title"><i class="fas fa-calendar-check"></i> Appointment Details</h3>
                    
                    <div class="form-group">
                        <label for="doctorId">Select Doctor *</label>
                        <select id="doctorId" name="doctorId" required>
                            <option value="">-- Choose Doctor --</option>
                            <option th:each="doctor : ${doctors}" 
                                    th:value="${doctor.doctorId}"
                                    th:text="${'Dr. ' + doctor.firstName + ' ' + doctor.lastName + ' (' + doctor.specialization + ')'}">
                                Doctor Name
                            </option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="appointmentDateTime">Date & Time *</label>
                        <input type="datetime-local" id="appointmentDateTime" name="appointmentDateTime" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="priority">Priority</label>
                        <select id="priority" name="priority">
                            <option value="LOW">Low</option>
                            <option value="NORMAL" selected>Normal</option>
                            <option value="HIGH">High</option>
                            <option value="URGENT">Urgent</option>
                        </select>
                    </div>
                    
                    <div class="form-group full-width">
                        <label for="reason">Reason for Visit</label>
                        <input type="text" id="reason" name="reason" placeholder="e.g., Annual checkup, Follow-up visit">
                    </div>
                    
                    <div class="form-group full-width">
                        <label for="notes">Additional Notes</label>
                        <textarea id="notes" name="notes" placeholder="Any additional information for the doctor..."></textarea>
                    </div>
                </div>

                <div class="form-actions">
                    <a th:href="@{/patient/list}" class="btn"><i class="fas fa-times"></i> Cancel</a>
                    <button type="submit" class="btn success"><i class="fas fa-calendar-check"></i> Schedule Appointment</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Set minimum date to today
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('appointmentDateTime').min = now.toISOString().slice(0, 16);
    </script>
</body>
</html>
