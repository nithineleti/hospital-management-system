<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Patient</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #00d4ff;
            --success: #00f5a0;
            --danger: #ff006e;
            --dark: #0f1419;
            --gradient-blue: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 50%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 2rem;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .header h1 {
            font-size: 2rem;
            background: var(--gradient-blue);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.7rem 1.2rem;
            border: 2px solid var(--primary);
            background: transparent;
            color: var(--primary);
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background: var(--gradient-blue);
            color: white;
            transform: translateY(-2px);
        }
        .btn.success { border-color: var(--success); color: var(--success); }
        .btn.success:hover { background: var(--success); color: #000; }
        .form-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 20px;
            padding: 2rem;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .form-group.full-width { grid-column: span 2; }
        .form-group label {
            color: var(--primary);
            font-weight: 500;
            font-size: 0.9rem;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 0.8rem 1rem;
            border: 2px solid rgba(0, 212, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }
        .form-group select option { background: #1a1f2e; }
        .form-group textarea { resize: vertical; min-height: 100px; }
        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(0, 212, 255, 0.2);
        }
        .section-title {
            grid-column: span 2;
            color: var(--primary);
            font-size: 1.1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
            margin-top: 1rem;
        }
        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .form-group.full-width, .section-title { grid-column: span 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-user-edit"></i> Edit Patient</h1>
            <a th:href="@{/patient/list}" class="btn">
                <i class="fas fa-arrow-left"></i> Back to List
            </a>
        </div>

        <div class="form-card">
            <form th:action="@{/patient/update}" method="post">
                <input type="hidden" name="_csrf" th:value="${_csrf?.token}">
                <input type="hidden" name="patientId" th:value="${patient.patientId}">
                <input type="hidden" name="registrationDate" th:value="${patient.registrationDate}">
                
                <div class="form-grid">
                    <h3 class="section-title"><i class="fas fa-user"></i> Personal Information</h3>
                    
                    <div class="form-group">
                        <label for="firstName">First Name *</label>
                        <input type="text" id="firstName" name="firstName" th:value="${patient.firstName}" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="lastName">Last Name *</label>
                        <input type="text" id="lastName" name="lastName" th:value="${patient.lastName}" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" name="email" th:value="${patient.email}" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="phoneNumber">Phone Number *</label>
                        <input type="tel" id="phoneNumber" name="phoneNumber" th:value="${patient.phoneNumber}" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="dateOfBirth">Date of Birth *</label>
                        <input type="date" id="dateOfBirth" name="dateOfBirth" th:value="${patient.dateOfBirth}" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="gender">Gender</label>
                        <select id="gender" name="gender">
                            <option value="">Select Gender</option>
                            <option value="Male" th:selected="${patient.gender == 'Male'}">Male</option>
                            <option value="Female" th:selected="${patient.gender == 'Female'}">Female</option>
                            <option value="Other" th:selected="${patient.gender == 'Other'}">Other</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="bloodGroup">Blood Group</label>
                        <select id="bloodGroup" name="bloodGroup">
                            <option value="">Select Blood Group</option>
                            <option value="A+" th:selected="${patient.bloodGroup == 'A+'}">A+</option>
                            <option value="A-" th:selected="${patient.bloodGroup == 'A-'}">A-</option>
                            <option value="B+" th:selected="${patient.bloodGroup == 'B+'}">B+</option>
                            <option value="B-" th:selected="${patient.bloodGroup == 'B-'}">B-</option>
                            <option value="AB+" th:selected="${patient.bloodGroup == 'AB+'}">AB+</option>
                            <option value="AB-" th:selected="${patient.bloodGroup == 'AB-'}">AB-</option>
                            <option value="O+" th:selected="${patient.bloodGroup == 'O+'}">O+</option>
                            <option value="O-" th:selected="${patient.bloodGroup == 'O-'}">O-</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="status">Status</label>
                        <select id="status" name="status">
                            <option value="ACTIVE" th:selected="${patient.status == 'ACTIVE' or patient.status == 'Active'}">Active</option>
                            <option value="INACTIVE" th:selected="${patient.status == 'INACTIVE' or patient.status == 'Inactive'}">Inactive</option>
                        </select>
                    </div>

                    <h3 class="section-title"><i class="fas fa-map-marker-alt"></i> Address Information</h3>
                    
                    <div class="form-group full-width">
                        <label for="address">Street Address</label>
                        <input type="text" id="address" name="address" th:value="${patient.address}">
                    </div>
                    
                    <div class="form-group">
                        <label for="city">City</label>
                        <input type="text" id="city" name="city" th:value="${patient.city}">
                    </div>
                    
                    <div class="form-group">
                        <label for="state">State</label>
                        <input type="text" id="state" name="state" th:value="${patient.state}">
                    </div>
                    
                    <div class="form-group">
                        <label for="zipCode">Zip Code</label>
                        <input type="text" id="zipCode" name="zipCode" th:value="${patient.zipCode}">
                    </div>

                    <h3 class="section-title"><i class="fas fa-notes-medical"></i> Medical Information</h3>
                    
                    <div class="form-group full-width">
                        <label for="medicalHistory">Medical History</label>
                        <textarea id="medicalHistory" name="medicalHistory" th:text="${patient.medicalHistory}"></textarea>
                    </div>
                </div>

                <div class="form-actions">
                    <a th:href="@{/patient/list}" class="btn"><i class="fas fa-times"></i> Cancel</a>
                    <button type="submit" class="btn success"><i class="fas fa-save"></i> Update Patient</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
