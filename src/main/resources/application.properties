spring.application.name=Hospital Management System

# Server Configuration
# Cloud Run requires listening on the PORT env var
server.port=${PORT:8080}
server.servlet.context-path=/hospital

# --- DATABASE CONFIGURATION ---
# Use H2 by default for local dev, but allow GCP overrides via env vars
# NOTE: if you see IPv6 lookup errors ("connection refused" on localhost) set the
# datasource URL to an explicit IPv4 address or force IPv4 using JVM flags.
# example: SPRING_DATASOURCE_URL=jdbc:mysql://127.0.0.1:3306/hospital_db
spring.datasource.url=jdbc:mysql://hospital-db.c6vma22s89f4.us-east-1.rds.amazonaws.com:3306/hospital_db
spring.datasource.username=admin
spring.datasource.password=Hospital,123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# IMPORTANT: The Driver class must change to MySQL when deploying to GCP


# --- JPA/HIBERNATE CONFIGURATION ---
# We use a generic MySQL dialect so it works on GCP MySQL 8.0+
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- THYMELEAF & LOGGING (Your existing settings are fine) ---
spring.thymeleaf.cache=false
logging.level.com.hospital=DEBUG